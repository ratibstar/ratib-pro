<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44" aria-label="Ratib Company">
  <defs>
    <linearGradient id="ratibGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560">
        <animate attributeName="stop-color" values="#e94560;#f1c40f;#5dade2;#e94560" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#5dade2">
        <animate attributeName="stop-color" values="#5dade2;#e94560;#f1c40f;#5dade2" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#f1c40f">
        <animate attributeName="stop-color" values="#f1c40f;#5dade2;#e94560;#f1c40f" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <text x="0" y="30" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="url(#ratibGrad)" letter-spacing="-0.5">Ratib Company</text>
</svg>
