name: Deploy PHP App to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  trigger-cpanel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate cPanel API secrets
        run: |
          if [ -z "${{ secrets.CPANEL_HOST }}" ]; then
            echo "Missing required secret: CPANEL_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.CPANEL_USER }}" ]; then
            echo "Missing required secret: CPANEL_USER"
            exit 1
          fi
          if [ -z "${{ secrets.CPANEL_API_TOKEN }}" ]; then
            echo "Missing required secret: CPANEL_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CPANEL_REPO_ROOT }}" ]; then
            echo "Missing required secret: CPANEL_REPO_ROOT"
            exit 1
          fi

      - name: Trigger cPanel Git deployment API
        run: |
          CLEAN_REPO_ROOT="$(printf '%s' "${{ secrets.CPANEL_REPO_ROOT }}" | tr -d '\r\n' | xargs)"
          if [ -z "$CLEAN_REPO_ROOT" ]; then
            echo "CPANEL_REPO_ROOT is empty after trimming whitespace."
            exit 1
          fi

          RESPONSE="$(curl -fsSL --get \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=$CLEAN_REPO_ROOT" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/create")"

          echo "cPanel API response:"
          echo "$RESPONSE"

          STATUS="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; print(r.get('status', d.get('status',0)))")"
          LOG_PATH="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; data=(r.get('data', d.get('data',{})) or {}); print(data.get('log_path',''))")"
          REPO_ROOT="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; data=(r.get('data', d.get('data',{})) or {}); print(data.get('repository_root',''))")"

          echo "cPanel deploy status: $STATUS"
          echo "cPanel deploy repository_root: $REPO_ROOT"
          echo "cPanel deploy log_path: $LOG_PATH"

          if [ "$STATUS" != "1" ]; then
            echo "Deployment API returned non-success status."
            exit 1
          fi
