name: Deploy PHP App to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  trigger-cpanel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret
        run: |
          if [ -z "${{ secrets.CPANEL_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing required secret: CPANEL_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger cPanel deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.CPANEL_DEPLOY_HOOK_URL }}"
