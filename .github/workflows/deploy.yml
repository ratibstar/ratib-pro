name: Deploy PHP App to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  trigger-cpanel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate cPanel API secrets
        run: |
          if [ -z "${{ secrets.CPANEL_HOST }}" ]; then
            echo "Missing required secret: CPANEL_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.CPANEL_USER }}" ]; then
            echo "Missing required secret: CPANEL_USER"
            exit 1
          fi
          if [ -z "${{ secrets.CPANEL_API_TOKEN }}" ]; then
            echo "Missing required secret: CPANEL_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CPANEL_REPO_ROOT }}" ]; then
            echo "Missing required secret: CPANEL_REPO_ROOT"
            exit 1
          fi

      - name: Trigger cPanel Git deployment API
        run: |
          CLEAN_REPO_ROOT="$(printf '%s' "${{ secrets.CPANEL_REPO_ROOT }}" | tr -d '\r\n' | xargs)"
          if [ -z "$CLEAN_REPO_ROOT" ]; then
            echo "CPANEL_REPO_ROOT is empty after trimming whitespace."
            exit 1
          fi

          CLEAN_BRANCH="$(printf '%s' "${{ github.ref_name }}" | tr -d '\r\n' | xargs)"
          if [ -z "$CLEAN_BRANCH" ]; then
            CLEAN_BRANCH="main"
          fi

          SYNC_RESPONSE="$(curl -fsSL --get \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=$CLEAN_REPO_ROOT" \
            --data-urlencode "branch=$CLEAN_BRANCH" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update")"

          echo "cPanel sync API response:"
          echo "$SYNC_RESPONSE"

          SYNC_STATUS="$(echo "$SYNC_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; print(r.get('status', d.get('status',0)))")"
          if [ "$SYNC_STATUS" != "1" ]; then
            echo "Repository sync API returned non-success status."
            exit 1
          fi

          RESPONSE="$(curl -fsSL --get \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=$CLEAN_REPO_ROOT" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/create")"

          echo "cPanel API response:"
          echo "$RESPONSE"

          STATUS="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; print(r.get('status', d.get('status',0)))")"
          LOG_PATH="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; data=(r.get('data', d.get('data',{})) or {}); print(data.get('log_path',''))")"
          REPO_ROOT="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; data=(r.get('data', d.get('data',{})) or {}); print(data.get('repository_root',''))")"

          echo "cPanel deploy status: $STATUS"
          echo "cPanel deploy repository_root: $REPO_ROOT"
          echo "cPanel deploy log_path: $LOG_PATH"

          if [ "$STATUS" != "1" ]; then
            echo "Deployment API returned non-success status."
            exit 1
          fi

          DEPLOY_ID="$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',d) or {}; data=(r.get('data', d.get('data',{})) or {}); print(data.get('deploy_id',''))")"
          if [ -z "$DEPLOY_ID" ]; then
            echo "No deploy_id returned; skipping deploy completion polling."
            exit 0
          fi

          echo "Polling deployment completion for deploy_id: $DEPLOY_ID"
          ATTEMPTS=24
          SLEEP_SECONDS=4
          for i in $(seq 1 $ATTEMPTS); do
            RETRIEVE_RESPONSE="$(curl -fsSL --get \
              -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
              --data-urlencode "repository_root=$CLEAN_REPO_ROOT" \
              --data-urlencode "deploy_id=$DEPLOY_ID" \
              "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/retrieve")"

            PARSED_DEPLOY_FIELDS="$(echo "$RETRIEVE_RESPONSE" | DEPLOY_ID="$DEPLOY_ID" python3 -c "import json,sys,os; d=json.load(sys.stdin); r=d.get('result',d) if isinstance(d,dict) else d; data=(r.get('data', d.get('data',{})) if isinstance(r,dict) else {}) or {}; items=data if isinstance(data,list) else [data]; items=[x for x in items if isinstance(x,dict)]; dep_id=os.environ.get('DEPLOY_ID','').strip(); target=next((x for x in items if dep_id and str(x.get('deploy_id',''))==dep_id), items[-1] if items else {}); flags=[target.get('is_complete'), target.get('complete'), target.get('completed')]; complete='1' if any(v in (1, True, '1', 'true', 'True') for v in flags) else '0'; exit_code='' if target.get('exit_code') is None else str(target.get('exit_code')); log_path=str(target.get('log_path','')); print('\\t'.join([complete, exit_code, log_path]))")"
            DEPLOY_COMPLETE="$(printf '%s' "$PARSED_DEPLOY_FIELDS" | cut -f1)"
            DEPLOY_EXIT_CODE="$(printf '%s' "$PARSED_DEPLOY_FIELDS" | cut -f2)"
            DEPLOY_LOG_PATH="$(printf '%s' "$PARSED_DEPLOY_FIELDS" | cut -f3)"

            echo "Attempt $i/$ATTEMPTS: complete=$DEPLOY_COMPLETE exit_code=${DEPLOY_EXIT_CODE:-pending} log_path=$DEPLOY_LOG_PATH"

            if [ "$DEPLOY_COMPLETE" = "1" ]; then
              if [ -n "$DEPLOY_EXIT_CODE" ] && [ "$DEPLOY_EXIT_CODE" != "0" ]; then
                echo "cPanel deploy task finished with non-zero exit code: $DEPLOY_EXIT_CODE"
                echo "Retrieve response:"
                echo "$RETRIEVE_RESPONSE"
                exit 1
              fi
              echo "cPanel deploy task completed successfully."
              exit 0
            fi

            sleep "$SLEEP_SECONDS"
          done

          echo "Timed out waiting for deployment completion."
          exit 1

